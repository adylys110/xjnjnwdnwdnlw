<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <meta name="description" content="WealthTrack — Pelacak keuangan lokal & privat untuk kebebasan finansial.">
  <meta property="og:title" content="WealthTrack Finansial">
  <meta property="og:description" content="Kelola arus kas, aset, dan utang. 100% tersimpan aman di perangkatmu.">
  <meta name="theme-color" id="themeColor" content="#0a0f1e">
  <link rel="manifest" href="manifest.json">
  <title>WealthTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <div><div class="logo-text">WealthTrack</div><div class="logo-sub">Kebebasan Finansial</div></div>
    </div>
    <nav id="sidenav"></nav>
    <div class="sidebar-bottom" id="sidebar-bottom"></div>
  </aside>
  <div id="main">
    <div id="topbar">
      <button class="btn-icon" id="menuToggle" style="display:none; margin-left:-12px" onclick="App.toggleMobileMenu()" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="page-title" id="pageTitle">Dashboard</div>
      <div id="topbar-actions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<nav id="bottom-nav"></nav>
<div class="toast-container" id="toastContainer"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="App.closeModal()" aria-label="Tutup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div id="lockScreen" class="modal-overlay" style="display:none; align-items:center; justify-content:center">
  <div class="modal" style="max-width:350px">
    <div class="modal-header"><div class="modal-title">🔐 Aplikasi Terkunci</div></div>
    <div class="modal-body">
      <div class="input-group"><label>PIN 4 Digit</label><input class="input-field" type="password" id="lockPin" maxlength="4" inputmode="numeric" pattern="[0-9]*"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="btnUnlock">Buka</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
